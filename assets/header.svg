<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#151a22"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#8a5cff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <rect x="80" y="70" width="4" height="160" fill="url(#accent)"/>

  <text x="120" y="155"
        fill="#ffffff"
        font-size="52"
        font-family="Inter, Arial, sans-serif"
        font-weight="700">
    For in a Row (Forza 4)
  </text>

  <text x="120" y="195"
        fill="#aab2c0"
        font-size="18"
        font-family="Inter, Arial, sans-serif">
    1vs1 multiplayer C++ implementation of Connect Four (PvP)
  </text>

  <rect x="120" y="210" width="620" height="2" fill="url(#accent)" opacity="0.8"/>
</svg>
